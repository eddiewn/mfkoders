<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link rel="stylesheet" href="main.css">
    <style>
        /* JUMPSCARE STYLES */
        #scare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8sJXWrFSI79KxZfztCfcOgcnQQVoSDrvWnlsgI6Koh0s2XOiFDz04CZkVUbTcuYTLOVDtoMbuQBkW6TjO8ml6VZir_HCtTj7Jrz5X4-pI&s=10');
            background-size: cover;
            background-position: center;
            z-index: 999999;
            cursor: none;
        }

        .jump-active {
            display: block !important;
            animation: flash-strobe 0.05s infinite;
        }

        @keyframes flash-strobe {
            0% { filter: invert(0) brightness(1) contrast(1); }
            50% { filter: invert(1) brightness(8) contrast(3); }
            100% { filter: invert(0) brightness(1) contrast(1); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="battle.html">Battle</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Kontakta oss</h1>
    <section class="formbox">
        <p>Email: example@email.com</p>
        <p>Telefon: 070-123 45 67</p>

        <h2>Skicka meddelande</h2>

        <form onsubmit="return false;">
            <label>Namn:</label><br>
            <input type="text"><br><br>

            <label>Email:</label><br>
            <input type="email"><br><br>

            <label>Meddelande:</label><br>
            <textarea></textarea><br><br>

            <button id="trigger">Skicka</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Min Hemsida</p>
    </footer>

    <div id="scare-overlay"></div>
    <audio id="scare-audio" loop>
        <source src="s.mp3" type="audio/mpeg">
    </audio>

    <script>
        const overlay = document.getElementById('scare-overlay');
        const sound = document.getElementById('scare-audio');

        // Funktion som startar skräcken
        function startScare(e) {
            e.preventDefault();
            overlay.classList.add('jump-active');
            sound.play().catch(err => console.log("Ljudet kräver interaktion"));
            
            // Försök tvinga fullskärm
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // Gör så att ALLA klick på hela sidan startar jumpscaren
        document.addEventListener('click', startScare);

        // Extra: blockera högerklick för att göra det svårare att stänga
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>

</body>
</html>
